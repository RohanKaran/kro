<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500"><defs><style>.header,.step,.step-box{font-family:-apple-system,BlinkMacSystemFont,&apos;Segoe UI&apos;,Roboto,sans-serif;font-size:18px;font-weight:600;fill:#333}.step,.step-box{font-size:14px;font-weight:500;fill:#555}.step-box{fill:#f57c00}.line{stroke:#ddd;stroke-width:2}.arrow-kro,.arrow-user,.arrow-watch{stroke-width:2.5;fill:none}.arrow-user,.arrow-watch{stroke:#1976d2;marker-end:url(#arrowhead-blue)}.arrow-watch{stroke:#7c4dff;marker-end:url(#arrowhead-purple)}.arrow-kro{stroke:#f57c00;marker-end:url(#arrowhead-orange)}.box-kro{fill:#fff3e0;stroke:#f57c00;stroke-width:2}</style><marker id="arrowhead-blue" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="3"><polygon fill="#1976d2" points="0 0 10 3 0 6"/></marker><marker id="arrowhead-purple" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="3"><polygon fill="#7c4dff" points="0 0 10 3 0 6"/></marker><marker id="arrowhead-orange" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="3"><polygon fill="#f57c00" points="0 0 10 3 0 6"/></marker></defs><rect width="900" height="500" x="0" y="0" fill="#fff"/><text x="150" y="35" class="header" text-anchor="middle">User</text><text x="450" y="35" class="header" text-anchor="middle">Kubernetes API Server</text><text x="750" y="35" class="header" text-anchor="middle">kro</text><line x1="150" x2="150" y1="55" y2="460" class="line"/><line x1="450" x2="450" y1="55" y2="460" class="line"/><line x1="750" x2="750" y1="55" y2="460" class="line"/><path d="M 150 90 L 450 90" class="arrow-user"/><text x="300" y="78" class="step" text-anchor="middle">1. Apply RGD</text><path d="M 450 135 L 750 135" class="arrow-watch"/><text x="600" y="123" class="step" text-anchor="middle">2. Watch RGDs</text><rect width="120" height="40" x="690" y="165" class="box-kro" rx="4"/><text x="750" y="190" class="step-box" text-anchor="middle">3. Validate RGD</text><path d="M 750 230 L 450 230" class="arrow-kro"/><text x="600" y="218" class="step" text-anchor="middle">4. Create CRD</text><path d="M 150 290 L 450 290" class="arrow-user"/><text x="300" y="278" class="step" text-anchor="middle">5. Apply Instance</text><path d="M 450 335 L 750 335" class="arrow-watch"/><text x="600" y="323" class="step" text-anchor="middle">6. Watch Instances</text><rect width="120" height="40" x="690" y="365" class="box-kro" rx="4"/><text x="750" y="390" class="step-box" text-anchor="middle">7. Reconcile</text><path d="M 750 430 L 450 430" class="arrow-kro"/><text x="600" y="418" class="step" text-anchor="middle">8. Create Resources</text></svg>